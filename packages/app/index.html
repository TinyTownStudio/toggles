<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="color-scheme" content="light dark" />

        <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <link rel="shortcut icon" href="/favicon.ico" />
        <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
        <link rel="manifest" href="/site.webmanifest" />

        <script>
            (function () {
                var s = localStorage.getItem("theme");
                var d = window.matchMedia("(prefers-color-scheme: dark)").matches;
                if (s === "dark" || (!s && d)) document.documentElement.classList.add("dark");
            })();
        </script>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:ital,wght@0,400;0,500;1,400&display=swap"
            rel="stylesheet"
        />
        <title>Toggles</title>
        <meta
            name="description"
            content="The modern SaaS starter kit. Authentication, billing, and a dashboard - ready to go."
        />
    </head>
    <body>
        <div id="app"></div>
        <script prerender type="module" src="/src/index.tsx"></script>
    </body>
</html>
